<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fun Learning Hub</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #87CEFA, #f9f9f9);
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
      color: #333;
    }
    body::before, body::after {
      content: '';
      position: absolute;
      background: white;
      width: 200px;
      height: 60px;
      border-radius: 50%;
      filter: blur(30px);
      opacity: 0.7;
      animation: float 20s linear infinite;
    }
    body::after {
      width: 250px;
      height: 80px;
      top: 100px;
      left: 50%;
      animation-delay: 10s;
    }
    @keyframes float {
      0% { transform: translateX(-100%) translateY(0); }
      100% { transform: translateX(110%) translateY(20px); }
    }

    h1 {
      text-align: center;
      margin-top: 20px;
      font-size: 2.4em;
      z-index: 1;
      position: relative;
    }

    #toggleBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      padding: 10px 15px;
      border-radius: 50px;
      border: none;
      background-color: #007bff;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    #toggleBtn:hover {
      background-color: #0056b3;
    }

    .container {
      margin: 30px auto;
      padding: 25px;
      width: 60%;
      border: 1px solid #ccc;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 5px 25px rgba(0,0,0,0.1);
      transition: background 0.3s, border-color 0.3s;
    }

    button {
      margin: 8px;
      padding: 12px 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #007bff;
      color: white;
      font-size: 1em;
      transition: background 0.3s, transform 0.2s;
    }
    button:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }
    #answers button {
      display: block;
      width: 60%;
      margin: 10px auto;
    }

    .correct { background-color: #28a745 !important; }
    .wrong { background-color: #dc3545 !important; }

    #progress, #score {
      font-weight: bold;
      margin-top: 10px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      transition: transform 0.3s;
    }
    img:hover { transform: scale(1.05); }

    @media (max-width: 600px) {
      .container { width: 90%; font-size: 14px; padding: 15px; }
      #answers button { width: 80%; }
    }
    @media (max-width: 900px) { .container { width: 75%; } }
    @media (min-width: 901px) { .container { width: 50%; } }

    .dark {
      background-color: #121212;
      color: #f0f0f0;
      background: linear-gradient(to bottom, #1a1a1a, #121212);
    }
    .dark .container {
      background: #1e1e1e;
      border-color: #555;
    }
    .dark button {
      background-color: #333;
      color: #f0f0f0;
    }
    .dark button:hover { background-color: #555; }
  </style>
</head>
<body>

<h1>🌟 Fun Learning Hub</h1>
<button id="toggleBtn" onclick="toggleMode()">🌙</button>

<div class="container">
  <h2>🧠 Quiz</h2>
  <p id="question">Question here</p>
  <div id="answers"></div>
  <button onclick="prevQuestion()">⬅ Previous</button>
  <button onclick="nextQuestion()">Next ➡</button>
  <p id="progress"></p>
  <p id="score"></p>
</div>

<div class="container">
  <h2>🖼 Image Carousel</h2>
  <img id="carousel" src="https://picsum.photos/400/200?1">
  <br>
  <button onclick="prevImage()">⬅</button>
  <button onclick="nextImage()">➡</button>
</div>

<div class="container">
  <h2>😂 Joke Generator</h2>
  <p id="joke">Click button to load joke</p>
  <button onclick="getJoke()">Get Joke</button>
</div>

<script>
  
  function toggleMode() {
    document.body.classList.toggle("dark");
    const btn = document.getElementById("toggleBtn");
    btn.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
  }

 const quiz = [
    { question: "What is HTML?", answers: ["Programming Language", "Markup Language", "Database"], correct: 1 },
    { question: "What is CSS?", answers: ["Styling Language", "Backend Tool", "Database"], correct: 0 },
    { question: "What is JavaScript used for?", answers: ["Styling", "Structure", "Interactivity"], correct: 2 },
    { question: "Which HTML element is used to display a paragraph of text?", answers: ["p", "text", "paragraph"], correct: 0 },
    { question: "Which CSS property changes text color?", answers: ["font-style", "color", "background"], correct: 1 },
    { question: "Which keyword is used to declare a variable in JS?", answers: ["var", "int", "string"], correct: 0 },
    { question: "Which attribute is used to set an image source in HTML?", answers: ["src", "href", "link"], correct: 0 },
    { question: "Which JS method logs output to console?", answers: ["console.print()", "console.log()", "print()"], correct: 1 }
  ];

  let current = 0;
  let score = 0;
  let answered = Array(quiz.length).fill(false); // track answered questions

  function loadQuestion() {
    document.getElementById("question").innerText = quiz[current].question;
    let answersHTML = "";
    quiz[current].answers.forEach((ans, index) => {
      answersHTML += `<button onclick="checkAnswer(this, ${index})">${ans}</button>`;
    });
    document.getElementById("answers").innerHTML = answersHTML;

    document.getElementById("progress").innerText = `Question ${current + 1} of ${quiz.length}`;
    document.getElementById("score").innerText = `Score: ${score}`;

    if(answered[current] !== false){
      const btns = document.querySelectorAll("#answers button");
      btns.forEach((btn, idx) => {
        btn.disabled = true;
        if(idx === quiz[current].correct) btn.classList.add("correct");
        if(idx === answered[current] && answered[current] !== quiz[current].correct) btn.classList.add("wrong");
      });
    }
  }

  function checkAnswer(button, index) {
    if(answered[current] === false){ 
      if(index === quiz[current].correct){
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("wrong");
        document.querySelectorAll("#answers button")[quiz[current].correct].classList.add("correct");
      }
      answered[current] = index; 
      document.querySelectorAll("#answers button").forEach(btn => btn.disabled = true);
      document.getElementById("score").innerText = `Score: ${score}`;
    }
  }

  function nextQuestion() {
    if(current < quiz.length - 1) current++;
    else alert(`🎉 Quiz Completed! Your final score is ${score} / ${quiz.length}`);
    loadQuestion();
  }

  function prevQuestion() {
    if(current > 0) current--;
    loadQuestion();
  }

  loadQuestion();

  const images = [
    "https://picsum.photos/400/200?1",
    "https://picsum.photos/400/200?2",
    "https://picsum.photos/400/200?3",
    "https://picsum.photos/400/200?4"
  ];
  let imgIndex = 0;
  function showImage(){ document.getElementById("carousel").src = images[imgIndex]; }
  function nextImage(){ imgIndex = (imgIndex+1)%images.length; showImage(); }
  function prevImage(){ imgIndex = (imgIndex-1+images.length)%images.length; showImage(); }

  function getJoke(){
    fetch("https://official-joke-api.appspot.com/random_joke")
      .then(res => res.json())
      .then(data => document.getElementById("joke").innerText = data.setup + " 😂 " + data.punchline)
      .catch(err => console.log(err));
  }
</script>

</body>
</html>
